name: "Deploy with CDK"
description: "Deploy infrastructure and services using AWS CDK"
inputs:
  region:
    description: "AWS region to deploy to"
    required: true
  registry:
    description: "Docker registry URL"
    required: true
  repository:
    description: "Docker repository name"
    required: true
  aws_access_key_id:
    description: "AWS Access Key ID"
    required: true
  aws_secret_access_key:
    description: "AWS Secret Access Key"
    required: true
  git_sha:
    description: "Docker image tag"
    required: true

runs:
  using: "composite"
  steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: CDK prepare
      working-directory: ./infrastructure
      shell: bash
      run: npm ci

    - name: Fetch Secret from AWS Secrets Manager
      id: fetch-secret
      shell: bash
      env:
        AWS_ACCESS_KEY_ID: ${{ inputs.aws_access_key_id }}
        AWS_SECRET_ACCESS_KEY: ${{ inputs.aws_secret_access_key }}
        AWS_REGION: ${{ inputs.region }}
      run: |
        SECRET_JSON=$(aws secretsmanager get-secret-value \
          --secret-id google-credentials-key \
          --region $AWS_REGION \
          --query SecretString \
          --output text)
        echo "SECRET_JSON=$SECRET_JSON" >> $GITHUB_ENV
        echo "SECRET_JSON=$SECRET_JSON" >> $GITHUB_OUTPUT

    - name: Deploy with CDK
      working-directory: ./infrastructure
      shell: bash
      env:
        REGISTRY: ${{ inputs.registry }}
        REPOSITORY: ${{ inputs.repository }}
        IMAGE_TAG: ${{ inputs.git_sha }}
        AWS_ACCESS_KEY_ID: ${{ inputs.aws_access_key_id }}
        AWS_SECRET_ACCESS_KEY: ${{ inputs.aws_secret_access_key }}
        AWS_REGION: ${{ inputs.region }}
        SECRET_JSON: ${{ steps.fetch-secret.outputs.SECRET_JSON }}
      run: |
        if ! command -v cdk &> /dev/null; then
          npm install -g aws-cdk
        fi
        cdk synth
        cdk deploy --all --require-approval never --outputs-file cdk-outputs.json

    - name: Query Load Balancer DNS Name
      working-directory: ./infrastructure
      shell: bash
      run: |
        echo "Load Balancer DNS Name:"
        cat cdk-outputs.json | jq -r '.["app-play4s-service-prod-load-balanced-fargate-service-stack"] | to_entries[] | select(.key | startswith("LoadBalancerConstructLoadBalancerDNSName")) | .value'
